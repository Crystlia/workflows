name: Test

on:
  workflow_call:
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      SOURCE_ORG:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CAN_AUTHENTICATE: ${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Generate GitHub App Token
        id: generate-token
        if: ${{ env.CAN_AUTHENTICATE == 'true' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ secrets.SOURCE_ORG || github.repository_owner }}

      - name: Configure Git Credentials
        if: ${{ env.CAN_AUTHENTICATE == 'true' }}
        run: |
          git config --global url."https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install the dependencies
        run: uv sync --all-groups --frozen

      - name: Run tests
        run: uv run --frozen pytest