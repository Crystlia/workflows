name: Test

on:
  workflow_call:
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      SOURCE_ORG:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: stable / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CAN_AUTHENTICATE: ${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Generate GitHub App Token
        if: ${{ env.CAN_AUTHENTICATE == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ secrets.SOURCE_ORG || github.repository_owner }}

      - name: Configure Git Credentials
        if: ${{ env.CAN_AUTHENTICATE == 'true' }}
        run: |
          git config --global \
            url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-targets --all-features --locked