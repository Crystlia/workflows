name: Check

on:
  workflow_call:
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      SOURCE_ORG:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      CAN_AUTHENTICATE: ${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}
      
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fmt
            cmd: ruff format --check
          - name: lint
            cmd: ruff check
          - name: mypy
            cmd: mypy .
          - name: audit
            cmd: licenses-deny check --quiet

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Generate GitHub App Token
        id: generate-token
        if: ${{ env.CAN_AUTHENTICATE == 'true' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ secrets.SOURCE_ORG || github.repository_owner }}

      - name: Configure Git Credentials
        if: ${{ env.CAN_AUTHENTICATE == 'true' }}
        run: |
          git config --global url."https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run ${{ matrix.name }}
        run: uv run ${{ matrix.cmd }}